services:
  admin-api:
    build: .
    environment:
      FREEMAIL_APP_NAME: ${FREEMAIL_APP_NAME:-FreeMail}
      FREEMAIL_ENV: ${FREEMAIL_ENV:-development}
      FREEMAIL_HOSTNAME: ${FREEMAIL_HOSTNAME:-freemail.kuzuryu.ai}
      FREEMAIL_RELEASE_VERSION: ${FREEMAIL_RELEASE_VERSION:-0.1.0-dev}
      FREEMAIL_RELEASE_COMMIT: ${FREEMAIL_RELEASE_COMMIT:-unknown}
      FREEMAIL_DB_PATH: ${FREEMAIL_DB_PATH:-/app/data/freemail.sqlite}
      FREEMAIL_ADMIN_API_TOKEN: ${FREEMAIL_ADMIN_API_TOKEN:-}
      FREEMAIL_BOOTSTRAP_TOKEN: ${FREEMAIL_BOOTSTRAP_TOKEN:-}
      FREEMAIL_SESSION_SECRET: ${FREEMAIL_SESSION_SECRET:-}
      FREEMAIL_SESSION_TTL_SECONDS: ${FREEMAIL_SESSION_TTL_SECONDS:-43200}
      FREEMAIL_MAIL_CORE_HOST: ${FREEMAIL_MAIL_CORE_HOST:-host.docker.internal}
      FREEMAIL_SMTP_PORT: ${FREEMAIL_SMTP_PORT:-2525}
      FREEMAIL_SUBMISSION_PORT: ${FREEMAIL_SUBMISSION_PORT:-2465}
      FREEMAIL_IMAP_PORT: ${FREEMAIL_IMAP_PORT:-2993}
      FREEMAIL_JMAP_PORT: ${FREEMAIL_JMAP_PORT:-18092}
    volumes:
      - freemail_data:/app/data
    ports:
      - "${FREEMAIL_BIND_ADDRESS:-127.0.0.1}:${FREEMAIL_API_PORT:-18090}:8080"
    restart: unless-stopped

  web:
    image: caddy:2-alpine
    profiles: ["web"]
    volumes:
      - ./apps/web:/usr/share/caddy:ro
    ports:
      - "${FREEMAIL_BIND_ADDRESS:-127.0.0.1}:${FREEMAIL_WEB_PORT:-18091}:80"
    restart: unless-stopped

  mail-core:
    image: stalwartlabs/stalwart:latest
    profiles: ["mail-core"]
    environment:
      STALWART_RECOVERY_ADMIN: ${STALWART_RECOVERY_ADMIN:-}
    volumes:
      - ./ops/stalwart/config.json:/etc/stalwart/config.json:ro
      - freemail_stalwart:/var/lib/stalwart
    ports:
      - "${FREEMAIL_BIND_ADDRESS:-127.0.0.1}:${FREEMAIL_SMTP_PORT:-2525}:25"
      - "${FREEMAIL_BIND_ADDRESS:-127.0.0.1}:${FREEMAIL_SUBMISSION_PORT:-2465}:465"
      - "${FREEMAIL_BIND_ADDRESS:-127.0.0.1}:${FREEMAIL_IMAP_PORT:-2993}:993"
      - "${FREEMAIL_BIND_ADDRESS:-127.0.0.1}:${FREEMAIL_JMAP_PORT:-18092}:8080"
      - "${FREEMAIL_BIND_ADDRESS:-127.0.0.1}:${FREEMAIL_HTTPS_PORT:-18443}:443"
    restart: unless-stopped

volumes:
  freemail_data:
  freemail_stalwart:
