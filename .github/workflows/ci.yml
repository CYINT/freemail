name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Lint
        run: python -m ruff check .
      - name: Install browser QA runtime
        run: python -m playwright install --with-deps chromium
      - name: Tests
        run: |
          python -m coverage run -m pytest
          python -m coverage report
          python -m coverage xml
      - name: Browser webmail QA
        run: python scripts/qa_web_browser.py
      - name: Mobile static QA
        run: python scripts/qa_mobile_static.py
      - name: Mobile dependency install
        run: npm ci --prefix apps/mobile
      - name: Mobile config validation
        run: npm run --prefix apps/mobile config:check
      - name: Mobile typecheck
        run: npm run --prefix apps/mobile typecheck
      - name: Mobile dependency audit
        run: npm audit --prefix apps/mobile --audit-level=moderate
      - name: Upload coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: true
      - name: Dependency audit
        run: python -m pip_audit -r requirements.txt
      - name: Compose config validation
        run: docker compose config --quiet
      - name: Container build validation
        run: docker compose build
